set -g prefix C-a
unbind C-b                         # free the original prefix
bind C-a send-prefix               # double Ctrl+A sends Ctrl+A to app
set -g base-index 1                # start indexing windows at 1
set -g pane-base-index 1           # start indexing panes at 1
set -g renumber-windows on         # renumber windows when any is closed
set -g escape-time 0               # no delay for Esc (essential for Vim)
set -g display-panes-time 2000     # show pane numbers for 2 seconds
set -g mouse on                    # enable mouse support
set -g mode-keys vi                # vi mode in copy mode
set -g set-clipboard on            # use system clipboard
set -g update-environment "DISPLAY XAUTHORITY SSH_AUTH_SOCK XDG_SESSION_TYPE"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*-256color:Tc"

# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded.."

# Status line
set -g status-position bottom
set -g status-style "bg=black,fg=green"
set -g status-justify centre
set -g status-left "#[fg=cyan]#S#[fg=green]->#[fg=cyan]w#I#[fg=green]->#[fg=cyan]p#P"
set -g status-left-length 20
set -g status-right "#[fg=yellow]#($HOME/miniconda3/bin/python -m agentic_metric bar | head -1) #[fg=green][#[fg=cyan]%Y-%m-%d %R#[fg=green]]"
set -g status-right-length 60
set -g status-interval 60              # refresh status bar every 60s
set -g window-status-current-style "bg=cyan,fg=black,bold"
set -g window-status-style "fg=green"

# Window navigation
bind a last-window                 # quick toggle last window
bind C-n next-window
bind C-p previous-window

# Activity notification
set -g visual-activity on

# Pane navigation (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (vim style, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes (keep current path)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane/Window management
bind x kill-pane
bind X kill-window
bind r command-prompt -I "#{window_name}" "rename-window '%%'"

# Reorder windows
bind -r C-[ swap-window -t -1
bind -r C-] swap-window -t +1

# Vim-tmux seamless navigation (Ctrl+h/j/k/l)
# Requires vim-tmux-navigator plugin in Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect settings
set -g @resurrect-dir '~/.config/tmux/resurrect'
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (keep at very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
